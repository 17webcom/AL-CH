    <style>
        /* تصفير الهوامش وتظبيط الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* تنسيق شريط القائمة العلوي */
        .aplr-menu {
            list-style: none;
            margin: 0;
            padding: 10px;
            background-color: #222;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            align-items: center;
            border-bottom: 2px solid #444;
            transition: all 0.3s ease;
        }

        .aplr-menu > * { flex-shrink: 0; }
        .aplr-menu::-webkit-scrollbar { height: 6px; }
        .aplr-menu::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
        .aplr-menu li { display: inline-block; }

        /* تنسيق عام للزراير */
        button, select, input, textarea {
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid transparent;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            background: transparent;
            transition: all 0.3s ease;
        }
        
        select option { background: #222; color: #fff; }
        input { background: #222; color: #fff; border: 1px solid #555; cursor: text; }

        .btn { background: #333; border: 1px solid; padding: 8px 12px; }
        .btn-outline { background: transparent; border: 1px solid #fff; color: #fff; }

        .zoom-wrapper { display: flex; gap: 5px; align-items: center; }
        .zoom-wrapper button { border: 1px solid #fff; }

        .admin-only { display: none !important; }

        .dashboard {
            background-color: #1e272e;
            padding: 15px;
            border-bottom: 2px solid #444;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .dashboard .row {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            margin-bottom: 12px; background: rgba(47, 53, 66, 0.8);
            padding: 10px; border-radius: 8px;
        }

        .top-close-bar {
            display: flex; flex-wrap: wrap; justify-content: space-between;
            align-items: center; margin-bottom: 15px; background: rgba(47, 54, 64, 0.8);
            padding: 10px; border-radius: 8px;
        }

        .status-badge { background: #222; padding: 5px 15px; border-radius: 20px; border: 1px solid #555; }
        .btn-danger { border-color: #e74c3c !important; color: #e74c3c !important; }

        #player-area {
            flex-grow: 1; background-color: #000; color: #555;
            position: relative; width: 100%;
        }

        .grid-1 { display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; gap: 2px; background: #222; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; height: 100%; gap: 2px; background: #222; }
        
        .screen-container { 
            width: 100%; height: 100%; position: relative; border: 3px solid transparent; 
            box-sizing: border-box; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #000; overflow: hidden; cursor: pointer;
        }
        .screen-container.active { border-color: #f1c40f; z-index: 10; box-shadow: 0 0 10px #f1c40f inset; }

        /* كود التدوير وإخفاء الشرائط الفولاذي */
        body.zen-mode .aplr-menu, body.zen-mode .dashboard { display: none !important; }
        
        body.rotated #player-area {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vh !important;
            height: 100vw !important;
            transform-origin: top left !important;
            transform: rotate(90deg) translateY(-100%) !important;
            z-index: 99999 !important;
            background: #000;
        }
        body.rotated .aplr-menu, body.rotated .dashboard { display: none !important; }

        /* تنسيقات السحب والتحريك والتحديد والتمييز */
        .aplr-link.dragging { opacity: 0.5; transform: scale(0.95); border: 2px dashed #f1c40f; }
        .aplr-link.drag-over { border: 2px solid #2ecc71 !important; transform: scale(1.05); }
        .aplr-link.selected-item { border: 2px dashed #3498db !important; box-shadow: 0 0 10px #3498db; opacity: 0.9; }
        
        /* التمييز الجديد للقناة الشغالة */
        .aplr-link.playing-item { 
            border: 2px solid #2ecc71 !important; 
            box-shadow: 0 0 15px #2ecc71 !important; 
            background: #27ae60 !important; 
            color: #fff !important; 
            transform: scale(1.05); 
            font-weight: bold; 
        }

        /* ستايلات النوافذ (المودال) المخصصة */
        #custom-edit-modal, #multi-manage-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100000; justify-content: center; align-items: center; 
            backdrop-filter: blur(5px); 
        }
        .edit-modal-content { 
            background: #1e272e; padding: 25px; border-radius: 12px; border: 2px solid #f1c40f; 
            width: 90%; max-width: 450px; color: white; display: flex; flex-direction: column; gap: 15px; 
            box-shadow: 0 0 25px rgba(0,0,0,0.7); 
        }
        .edit-modal-content h3 { margin: 0; text-align: center; color: #f1c40f; font-size: 20px; }
        .edit-modal-content label { font-size: 14px; font-weight: bold; color: #aaa; margin-bottom: 5px; display: block; }
        .edit-modal-content input, .edit-modal-content select { 
            width: 100%; padding: 12px; box-sizing: border-box; background: #111; 
            border: 1px solid #555; color: white; border-radius: 5px; font-size: 14px; 
        }
        .edit-modal-content input:focus, .edit-modal-content select:focus { outline: none; border-color: #3498db; }
        .edit-modal-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; margin-top: 15px; }
        .edit-modal-actions button { flex: 1 1 45%; padding: 12px; font-weight: bold; border-radius: 8px; font-size: 15px; }
    </style>

        // ============================================
        // 3. دوال الجلب والحفظ
        // ============================================
        window.normalizeFolders = function(rawFolders) {
            let normalized = { "main": [] };
            try {
                if (!rawFolders) return normalized;

                if (Array.isArray(rawFolders)) {
                    normalized["main"] = rawFolders.filter(item => item && typeof item === 'object');
                } else if (typeof rawFolders === 'object') {
                    for (let key in rawFolders) {
                        if (Array.isArray(rawFolders[key])) {
                            normalized[key] = rawFolders[key].filter(item => item && typeof item === 'object');
                        } else if (typeof rawFolders[key] === 'object' && rawFolders[key] !== null) {
                            normalized[key] = Object.values(rawFolders[key]).filter(item => item && typeof item === 'object');
                        } else {
                            normalized[key] = [];
                        }
                    }
                }
                
                if (!normalized["main"]) normalized["main"] = [];

                for (let key in normalized) {
                    normalized[key].forEach(item => {
                        if (!item.type) item.type = 'channel';
                        if (!item.name) item.name = 'قناة بدون اسم';
                        if (!item.link && item.type === 'channel') item.link = '#';
                    });
                }
            } catch(e) { console.error("Error formatting data:", e); }
            return normalized;
        };

        window.doSaveToFirebase = function(silent = false) {
            window.playerSettings = {
                engine: document.getElementById("player-engine-selector").value,
                directLink: document.getElementById("direct-link-input").value,
                autoSwitchSec: document.getElementById("auto-switch-sec").value,
                theme: document.getElementById("theme-selector").value,
                zoom: window.currentZoom || 1,
                autoSwitchState: document.getElementById('btn-auto-switch').innerText.includes("مفعل"),
                editModeState: window.isEditMode,
                strictProtectState: document.getElementById('btn-strict-protect').innerText.includes("مفعل"),
                overlayState: document.getElementById('btn-overlay').innerText.includes("مفعل"),
                sandboxState: document.getElementById('btn-sandbox').innerText.includes("مفعل"),
                popupsState: document.getElementById('btn-popups').innerText.includes("مسموح"),
                inspectState: document.getElementById('btn-inspect').innerText.includes("مفعل"),
                superBlockerState: window.superBlockerEnabled, 
                stalker: (window.playerSettings && window.playerSettings.stalker) ? window.playerSettings.stalker : null
            };

            let dataToSave = {
                folders: window.folderState.folders,
                settings: window.playerSettings
            };

            window.db.ref('playerDataFull/').set(dataToSave).then(() => {
                if(!silent && window.triggerActionSuccess) window.triggerActionSuccess('btn-save-server', '💾 حفظ السيرفر', '#2ed573');
            }).catch((error) => {
                if(!silent) alert("حصلت مشكلة في الحفظ: " + error);
            });
        };

        window.doLoadFromFirebase = function() {
            window.db.ref('playerDataFull/').once('value').then((snapshot) => {
                window.isDataFetched = true; 
                let data = snapshot.exists() ? snapshot.val() : null;
                let hasValidFolders = false;
                
                if (data) {
                    if(data.settings) {
                        window.playerSettings = data.settings;
                        if(window.applySettingsToUI) window.applySettingsToUI();
                    }
                    
                    if (data.folders && typeof data.folders === 'object' && Object.keys(data.folders).length > 0) {
                        window.folderState.folders = window.normalizeFolders(data.folders);
                        hasValidFolders = true;
                    } else if (data.main || (Array.isArray(data) && data.length > 0)) {
                        window.folderState.folders = window.normalizeFolders(data);
                        hasValidFolders = true;
                    }
                }
                
                if (!hasValidFolders) {
                    window.db.ref('playerData/').once('value').then((snap2) => {
                        if(snap2.exists()) {
                            let oldData = snap2.val();
                            window.folderState.folders = window.normalizeFolders(oldData);
                        } else {
                            if (!window.folderState.folders) window.folderState.folders = { "main": [] };
                        }
                        window.folderState.currentFolderId = "main";
                        if(window.renderCurrentFolder) window.renderCurrentFolder();
                        if(window.triggerActionSuccess) window.triggerActionSuccess('btn-load-server', '☁️ جلب السيرفر', 'transparent');
                    });
                } else {
                    window.folderState.currentFolderId = "main";
                    if(window.renderCurrentFolder) window.renderCurrentFolder();
                    if(window.triggerActionSuccess) window.triggerActionSuccess('btn-load-server', '☁️ جلب السيرفر', 'transparent');
                }
            }).catch((error) => {
                console.error("مشكلة في الجلب: " + error);
            });
        };

        // نظام الزوار المتصلين الآن
        window.setupPresence = function() {
            if (!window.db) return;
            let amOnline = window.db.ref('.info/connected');
            let userRef = window.db.ref('active_visitors').push();
            let presenceRef = window.db.ref('active_visitors');

            amOnline.on('value', function(snapshot) {
                if (snapshot.val()) {
                    userRef.onDisconnect().remove();
                    userRef.set(true);
                }
            });

            presenceRef.on('value', function(snapshot) {
                let count = snapshot.numChildren();
                let counterElem = document.getElementById('visitor-counter-display');
                if (counterElem) counterElem.innerText = "🟢 المتصلين الآن: " + count;
            });
        };

        // نظام مراقبة الـ Inspect الجديد (يمنع التجمد ويحفظ إجباري)
        window.setupInspectObserver = function() {
            window.inspectObserver = new MutationObserver(function(mutations) {
                if(window.isRenderingDOM) return;

                let shouldSave = false;

                mutations.forEach(m => {
                    if(m.type === 'attributes' && (m.attributeName === 'data-link' || m.attributeName === 'data-name' || m.attributeName === 'href')) {
                        shouldSave = true;
                    } else if (m.type === 'childList' || m.type === 'characterData') {
                        shouldSave = true;
                    }
                });

                if(shouldSave) {
                    clearTimeout(window.inspectSaveTimer);
                    window.inspectSaveTimer = setTimeout(function() {
                        window.isRenderingDOM = true;

                        // تحديث الداتا الداخلية للمتصفح فقط (بدون Refresh للمتصفح عشان متقفلش الشاشة)
                        window.syncDOMToState();

                        // حفظ إجباري للسيرفر حتى لو مش دايس دخول آدمن
                        window.doSaveToFirebase(true);

                        if(window.triggerActionSuccess) {
                            window.triggerActionSuccess('btn-save-server', '💾 تم الحفظ للسيرفر تلقائياً', '#2ed573');
                        }

                        // NOTE: لغيت الـ renderCurrentFolder() هنا نهائياً عشان المتصفح ميمسحش الزرار 
                        // اللي إنت بتعدل فيه وتتجمد الشاشة.

                        setTimeout(() => { window.isRenderingDOM = false; }, 300);
                    }, 800); // 0.8 ثانية وقت كافي جداً بعد ما تدوس Enter
                }
            });

            let list = document.getElementById('dynamic-channels-list');
            if(list) {
                window.inspectObserver.observe(list, { childList: true, subtree: true, characterData: true, attributes: true, attributeFilter: ['href', 'data-link', 'data-name'] });
            }
        };

        // ============================================
        // 4. استخراج وإضافة (HTML / جماعي) في الفولدر الحالي
        // ============================================
        window.extractFromHTML = function() {
            let existing = document.getElementById("html-paste-overlay");
            if(existing) existing.remove();

            let container = document.createElement("div");
            container.id = "html-paste-overlay";
            container.style.position = "fixed";
            container.style.top = "50%";

                <h3 style="color:white; margin-top:0; text-align:center;">📥 انسخ كود الـ HTML بالكامل هنا:</h3>
                <textarea id="html-paste-box" style="width: 400px; height: 200px; background:#111; color:white; border:1px solid #555; direction:ltr; padding:10px;"></textarea><br><br>
                <div style="display:flex; justify-content:center; gap:10px;">

                    <button onclick="document.getElementById('html-paste-overlay').remove()" style="background:#e74c3c; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">إلغاء</button>
                </div>
            `;
            document.body.appendChild(container);
        };

        window.processHTMLPaste = function() {
            let inputHTML = document.getElementById("html-paste-box").value;
            if (!inputHTML) { alert("لم تقم بإدخال أي كود!"); return; }
            let parser = new DOMParser();
            let doc = parser.parseFromString(inputHTML, 'text/html');
            let links = doc.querySelectorAll('a');
            let extractedChannels = [];
            
            links.forEach(a => {
                let href = a.getAttribute('href');
                let name = a.innerText.trim() || a.textContent.trim();
                if (!name) {
                    let img = a.querySelector('img');
                    if (img) name = img.getAttribute('alt') || img.getAttribute('title');
                }
                if (!name) name = "قناة مستخرجة";

                if (href && href !== "#" && !href.startsWith("javascript:")) {
                    extractedChannels.push({ type: "channel", name: name, link: href });
                }
            });

            if (extractedChannels.length > 0) {
                let currentFolder = window.folderState.currentFolderId;
                if(!window.folderState.folders[currentFolder]) window.folderState.folders[currentFolder] = [];
                window.folderState.folders[currentFolder].unshift(...extractedChannels);
                window.renderCurrentFolder();
                if(window.triggerActionSuccess) window.triggerActionSuccess('btn-extract-html', '📥 استخراج من HTML', '#1abc9c');
                window.autoSave();
                alert("تم استخراج وإضافة " + extractedChannels.length + " قناة بنجاح!");
            } else {
                alert("لم يتم العثور على أي روابط صالحة في الكود المضاف!");
            }
            document.getElementById("html-paste-overlay").remove();
        };

        window.openBulkModal = function() {
            let existing = document.getElementById("bulk-add-overlay");
            if(existing) existing.remove();

            let container = document.createElement("div");
            container.id = "bulk-add-overlay";
            container.style.position = "fixed";
            container.style.top = "50%";
            container.style.left = "50%";
            container.style.transform = "translate(-50%, -50%)";
            container.style.background = "#222";
            container.style.padding = "20px";
            container.style.zIndex = "9999";
            container.style.border = "2px solid #8e44ad";
            container.style.borderRadius = "10px";
            container.style.boxShadow = "0 0 20px rgba(0,0,0,0.8)";
            container.innerHTML = `
                <h3 style="color:white; margin-top:0; text-align:center;">➕ إضافة جماعية للفولدر الحالي</h3>
                <p style="color:#aaa; font-size:12px; text-align:center;">أدخل كل قناة في سطر (اسم,رابط) أو (روابط فقط):</p>
                <textarea id="bulk-paste-box" style="width: 400px; height: 200px; background:#111; color:white; border:1px solid #555; direction:ltr; padding:10px;"></textarea><br><br>
                <div style="margin-bottom:15px; text-align:center;">
                    <label style="color:white; font-weight:bold;">مكان الإضافة: </label>
                    <select id="bulk-position" style="background:#333; color:white; border:1px solid #555; border-radius:5px; padding:5px;">
                        <option value="1">في البداية</option>
                        <option value="2">في النهاية</option>
                    </select>
                </div>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button onclick="window.processBulkPaste()" style="background:#8e44ad; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">إضافة القنوات</button>
                    <button onclick="document.getElementById('bulk-add-overlay').remove()" style="background:#e74c3c; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">إلغاء</button>
                </div>
            `;
            document.body.appendChild(container);
        };

        window.processBulkPaste = function() {
            let input = document.getElementById("bulk-paste-box").value;
            let pos = document.getElementById("bulk-position").value;
            if(!input || !input.trim()) { alert("لم تقم بإدخال أي قنوات!"); return; }

            let targetFolderId = window.folderState.currentFolderId;
            if(!window.folderState.folders[targetFolderId]) window.folderState.folders[targetFolderId] = [];
            let arr = window.folderState.folders[targetFolderId];
            
            let newChannels = [];
            let lines = input.split('\n');
            lines.forEach((l, index) => {
                let text = l.trim();
                if(text) {
                    if(text.includes(',')) {
                        let parts = text.split(',');
                        newChannels.push({ type: "channel", name: parts[0].trim(), link: parts.slice(1).join(',').trim() });
                    } else if (text.startsWith('http')) {
                        newChannels.push({ type: "channel", name: "قناة " + (index + 1), link: text });
                    }
                }
            });

            if(newChannels.length > 0) {
                if(pos === "2") { arr.push(...newChannels); } 
                else {
                    let firstFolderIdx = arr.findIndex(x => x.type === 'folder');
                    if(firstFolderIdx === -1) arr.unshift(...newChannels);
                    else arr.splice(firstFolderIdx, 0, ...newChannels);
                }
                window.renderCurrentFolder();
                if(window.triggerActionSuccess) window.triggerActionSuccess('btn-bulk-add', '➕ إضافة جماعية', '#8e44ad');
                window.autoSave();
                alert("تم إضافة " + newChannels.length + " قناة بنجاح للفولدر الحالي!");
            } else {
                alert("لم يتم العثور على صيغة صحيحة (اسم,رابط أو روابط فقط)!");
            }
            document.getElementById("bulk-add-overlay").remove();
        };

                alert("مفيش قناة شغالة عشان تنسخ الرابط بتاعها!");

        };

            let p = prompt("برجاء إدخال كلمة المرور:");
            if (!p) return false;
            if (btoa(p) === "I1pNc2Q0MmQq") { 
                sessionStorage.setItem("adminAuth", "true");
                return true; 
            } 
            else { alert("كلمة المرور خاطئة!"); return false; }

            dash.style.display = (dash.style.display === "none" || dash.style.display === "") ? "block" : "none";
        };

        window.openPlayerFullscreen = function() {
            document.body.classList.add("zen-mode");
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.mozRequestFullScreen) { elem.mozRequestFullScreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        };

        window.toggleZenMode = function() {
            document.body.classList.toggle("zen-mode");
        };

        window.toggleMobileRotation = function() {
            document.body.classList.toggle("rotated");
            window.dispatchEvent(new Event('resize'));
        };

        document.addEventListener('fullscreenchange', exitHandler);
        document.addEventListener('webkitfullscreenchange', exitHandler);
        document.addEventListener('mozfullscreenchange', exitHandler);
        document.addEventListener('MSFullscreenChange', exitHandler);
        function exitHandler() {
            if (!document.fullscreenElement && !document.webkitIsFullScreen && !document.mozFullScreen && !document.msFullscreenElement) {
                document.body.classList.remove("zen-mode");
            }
        }

        window.toggleSuperBlocker = function() {

        window.generateM3UString = function(itemsArray) {
            let m3u = "#EXTM3U\n";
            function extract(items, path) {
                items.forEach(item => {
                    if(item.type === 'folder') {
                        extract(window.folderState.folders[item.id] || [], path ? path + " / " + item.name : item.name);
                    } else {
                        m3u += `#EXTINF:-1 group-title="${path || 'المقاطع المحددة'}",${item.name}\n${item.link}\n`;
                    }
                });
            }
            extract(itemsArray, "");
            return m3u;
        };

        window.generateLinksString = function(itemsArray) {
            let links = "";
            function extract(items) {
                items.forEach(item => {
                    if(item.type === 'folder') {
                        extract(window.folderState.folders[item.id] || []);
                    } else {
                        links += `${item.link}\n`;
                    }
                });
            }
            extract(itemsArray);
            return links.trim();
        };

        window.mediaRecorder = null;
        window.recordedChunks = [];
        window.toggleRecording = async function() {
            let btn = document.getElementById('record-btn');
            if (window.mediaRecorder && window.mediaRecorder.state === "recording") {
                window.mediaRecorder.stop();
                btn.innerText = "🔴 تسجيل"; btn.style.background = "#c0392b";
                return;
            }
            if (!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia === 'undefined') {
                alert("عفواً، متصفحك يمنع تسجيل الشاشة كإجراء أمني للروابط المحلية. جرب رفع الموقع."); return;
            }
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                window.mediaRecorder = new MediaRecorder(stream);
                window.mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) window.recordedChunks.push(e.data); };
                window.mediaRecorder.onstop = function() {
                    const blob = new Blob(window.recordedChunks, { type: "video/webm" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url; a.download = "recording_" + Date.now() + ".webm";
                    a.click(); URL.revokeObjectURL(url);
                    window.recordedChunks = [];
                };
                window.mediaRecorder.start();
                btn.innerText = "⏹ إيقاف التسجيل"; btn.style.background = "#f39c12";
                stream.getVideoTracks()[0].onended = function () {
                    if(window.mediaRecorder.state === "recording") window.mediaRecorder.stop();
                    btn.innerText = "🔴 تسجيل"; btn.style.background = "#c0392b";
                };
            } catch (err) { alert("تم إلغاء التسجيل."); }
        };

        window.generateIframe = function(url, screenNum = null) {
            window.currentPlayingUrl = url;
            let engine = document.getElementById("player-engine-selector").value;
            let overlayStyle = window.prot.overlay ? 'block' : 'none';
            let targetScreen = screenNum || window.activeScreen || 1;
            let container = document.getElementById("screen-" + targetScreen);
            
            if(!container) container = document.getElementById("player-area");

            if (url.includes('.m3u8') && (engine === 'hlsjs' || engine === 'native')) {
                container.innerHTML = `<video id="video-player-${targetScreen}" controls autoplay style="width:100%; height:100%; object-fit:contain;"></video><div id="player-overlay-${targetScreen}" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; display:${overlayStyle};"></div>`;
                let video = document.getElementById('video-player-' + targetScreen);
                if (Hls.isSupported() && engine === 'hlsjs') {
                    let hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url; video.play();
                } else { alert("متصفحك لا يدعم تشغيل الروابط الخام مباشرة."); }
            } else {
                let sandboxAttr = "";
                if(window.superBlockerEnabled) {
                    sandboxAttr = 'sandbox="allow-scripts allow-same-origin"'; 
                } else {
                    sandboxAttr = window.prot.sandbox ? 'sandbox="allow-scripts allow-same-origin ' + (window.prot.popups ? 'allow-popups allow-popups-to-escape-sandbox' : '') + '"' : '';
                }
                container.innerHTML = `<iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen ${sandboxAttr}></iframe><div id="player-overlay-${targetScreen}" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; background:transparent; display:${overlayStyle};"></div>`;
            }
        };

        // التحديث للـ DOM عشان يقرا الروابط الجديدة بدون أي مشاكل
        window.syncDOMToState = function() {
            let container = document.getElementById("dynamic-channels-list");
            let items = container.querySelectorAll(".aplr-link");
            let newElements = [];
            
            items.forEach(btn => {
                let text = btn.innerText || btn.textContent;
                if(text === "🔙 رجوع للرئيسية" || text === "☰" || text === "Dashboard" || text.includes("🔍") || text.includes("🛡️") || text.includes("⚠️") || text.includes("📥") || text.includes("✏️") || text.includes("➕")) return;
                
                let isFolder = btn.getAttribute("data-type") === "folder";
                let name = btn.getAttribute("data-name");
                
                if(!name) {
                    let cleanText = text.replace("⚙️ ", "").trim();
                    name = isFolder ? cleanText.replace("📁 ", "").trim() : cleanText;
                }
                if(!name) { let img = btn.querySelector('img'); if (img) name = img.getAttribute('alt') || img.getAttribute('title'); }
                if(!name) name = "قناة بدون اسم";
                
                let type = btn.getAttribute("data-type") || (isFolder ? "folder" : "channel");
                let link = btn.getAttribute("data-link") || btn.getAttribute("href");
                let fId = btn.getAttribute("data-id");
                
                if(type === "folder") {
                    if(!fId) { fId = 'folder_' + Date.now() + Math.random().toString(36).substr(2, 5); btn.setAttribute("data-id", fId); }
                    newElements.push({ type: 'folder', id: fId, name: name });
                } else if(type === "channel") {
                    if(!link || link === "#" || link.startsWith("javascript")) {
                        link = "#";
                    }
                    newElements.push({ type: 'channel', name: name, link: link });
                    if(!btn.hasAttribute("data-link")) btn.setAttribute("data-link", link);
                }
            });
            window.folderState.folders[window.folderState.currentFolderId] = newElements;
        };

        window.renderCurrentFolder = function() {
            window.isRenderingDOM = true;
            let container = document.getElementById("dynamic-channels-list");
            container.innerHTML = ""; 
            
            if (window.folderState.currentFolderId !== "main") {
                let backBtn = document.createElement("button");
                backBtn.className = "aplr-link";
                backBtn.style.background = "#c0392b";
                backBtn.innerText = "🔙 رجوع للرئيسية";
                backBtn.onclick = function() {
                    window.folderState.currentFolderId = "main";
                    window.selectedItems = [];
                    window.renderCurrentFolder();
                };
                container.appendChild(backBtn);
            }
            
            let elements = window.folderState.folders[window.folderState.currentFolderId] || [];
            let channelCounter = 0; 
            let draggedItemIdx = null; 
            
            elements.forEach((item, index) => {
                let btn = document.createElement("button");
                btn.className = "aplr-link";
                btn.setAttribute("data-type", item.type);
                btn.setAttribute("data-name", item.name);
                
                if(item.type === "folder") {
                    btn.setAttribute("data-id", item.id);
                } else {
                    btn.setAttribute("data-link", item.link);
                    btn.setAttribute("data-channel-idx", channelCounter);
                    channelCounter++;
                }
                
                let prefix = window.isEditMode ? "⚙️ " : "";
                btn.style.background = (item.type === "folder") ? "#d35400" : "#34495e";
                btn.innerText = prefix + (item.type === "folder" ? "📁 " : "") + item.name;

                if (window.isSelectMode && window.selectedItems.includes(item)) {
                    btn.classList.add("selected-item");
                }

                if (item.type !== "folder" && window.currentPlayingUrl && item.link === window.currentPlayingUrl) {
                    btn.classList.add("playing-item");
                }

                if(window.isEditMode) {
                    btn.draggable = true;
                    btn.ondragstart = (e) => { draggedItemIdx = index; btn.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; };
                    btn.ondragover = (e) => { e.preventDefault(); btn.classList.add("drag-over"); };
                    btn.ondragleave = (e) => { btn.classList.remove("drag-over"); };
                    btn.ondragend = () => { btn.classList.remove("dragging"); document.querySelectorAll('.aplr-link').forEach(el => el.classList.remove('drag-over')); };
                    btn.ondrop = (e) => {
                        e.preventDefault();
                        btn.classList.remove("drag-over");
                        if(draggedItemIdx !== null && draggedItemIdx !== index) {
                            let arr = window.folderState.folders[window.folderState.currentFolderId];
                            let draggedItem = arr.splice(draggedItemIdx, 1)[0];
                            arr.splice(index, 0, draggedItem);
                            window.renderCurrentFolder();
                            window.autoSave();
                        }
                    };
                }

                // الكليك المباشر من الـ DOM عشان لو متعدل من الـ Inspect يشتغل فوراً وميتجمدش
                btn.onclick = function() { 
                    let currentType = btn.getAttribute("data-type");
                    let currentId = btn.getAttribute("data-id");
                    let currentLink = btn.getAttribute("data-link"); // بيقرا اللينك فريش من الواجهة
                    let currentName = btn.getAttribute("data-name");

                    if(window.isSelectMode) {
                        let currentItem = window.folderState.folders[window.folderState.currentFolderId].find(x => 
                            x.type === currentType && (currentType === 'folder' ? x.id === currentId : x.link === currentLink && x.name === currentName)
                        );
                        if(!currentItem) currentItem = window.folderState.folders[window.folderState.currentFolderId][index];

                        let itemIndex = window.selectedItems.findIndex(x => x === currentItem);
                        if(itemIndex > -1) {
                            window.selectedItems.splice(itemIndex, 1);
                            btn.classList.remove('selected-item');
                        } else {
                            if(currentItem) window.selectedItems.push(currentItem);
                            btn.classList.add('selected-item');
                        }
                    } else if(window.isEditMode) {
                        window.openEditModal(index);
                    } else {
                        if (currentType === "folder") {
                            window.folderState.currentFolderId = currentId;
                            window.selectedItems = [];
                            window.renderCurrentFolder();
                        } else {
                            window.currentChannelIndex = parseInt(btn.getAttribute("data-channel-idx"));
                            
                            // اللينك بيتبعت طازة من الزرار نفسه للمشغل
                            window.generateIframe(currentLink);
                            
                            let statusBadge = document.getElementById("stream-status");
                            if(statusBadge) statusBadge.innerText = "🟢 يعمل الآن: " + currentName;

                            document.querySelectorAll('.aplr-link').forEach(el => el.classList.remove('playing-item'));
                            btn.classList.add('playing-item');
                        }
                    }
                };
                container.appendChild(btn);
            });
            setTimeout(() => { window.isRenderingDOM = false; }, 200);
        };

        window.addNewFolder = function() {
            let folderName = prompt("اكتب اسم المجلد الجديد:");
            if (folderName) {
                let folderId = "folder_" + Date.now();
                if(!window.folderState.folders) window.folderState.folders = { "main": [] };
                window.folderState.folders[folderId] = [];
                window.folderState.folders[window.folderState.currentFolderId].push({ type: "folder", id: folderId, name: folderName });
                window.renderCurrentFolder();
                window.autoSave();
            }
        };

        window.addNewChannel = function() {
            let choice = prompt("اختر طريقة الإضافة:\n1- إضافة قناة يدوياً (بالرابط)\n2- استيراد ملف M3U كامل داخل هذا المجلد", "1");
            if (choice === "1") {
                let channelName = prompt("اكتب اسم القناة الجديدة:");
                if (channelName) {
                    let channelLink = prompt("اكتب رابط القناة (اللينك):");
                    if (channelLink) {
                        let pos = prompt("أين تريد إضافة القناة؟\n1- في البداية\n2- في النهاية", "1");
                        if(!window.folderState.folders[window.folderState.currentFolderId]) window.folderState.folders[window.folderState.currentFolderId] = [];
                        let arr = window.folderState.folders[window.folderState.currentFolderId];
                        let newCh = { type: "channel", name: channelName, link: channelLink.trim() };
                        
                        if(pos === "2") { arr.push(newCh); } 
                        else {
                            let firstFolderIdx = arr.findIndex(x => x.type === 'folder');
                            if(firstFolderIdx === -1) arr.unshift(newCh);
                            else arr.splice(firstFolderIdx, 0, newCh);

                        window.autoSave();

        window.addTopBarChannel = function() { 
            let linkToAdd = window.currentPlayingUrl;
            if(!linkToAdd) { 
                let manualLink = prompt("لا توجد قناة تعمل حالياً. يمكنك كتابة رابط القناة يدوياً لتخزينه:");
                if(manualLink) { linkToAdd = manualLink; } else { return; }

            let name = prompt("اكتب اسم القناة:", "قناة مفضلة");
            if(name) {
                if(!window.folderState.folders[window.folderState.currentFolderId]) window.folderState.folders[window.folderState.currentFolderId] = [];
                let arr = window.folderState.folders[window.folderState.currentFolderId];
                let pos = prompt("أين تريد إضافة القناة؟\n1- في البداية\n2- في النهاية", "1");
                let newCh = { type: "channel", name: name, link: linkToAdd };
                
                if(pos === "2") { arr.push(newCh); } 
                else {
                    let firstFolderIdx = arr.findIndex(x => x.type === 'folder');
                    if(firstFolderIdx === -1) arr.unshift(newCh);
                    else arr.splice(firstFolderIdx, 0, newCh);
                }
                
                window.renderCurrentFolder();
                window.autoSave();
                if(window.triggerActionSuccess) window.triggerActionSuccess('btn-add-topbar', '➕ إضافة للشريط', '#e67e22'); 
            }

        window.handleFileInput = function(e) {
            if(e.target.files.length > 0) {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function(event) {
                    window.processM3UContent(event.target.result);
                    let lbl = document.querySelector('label[for="fileInput"]');
                    if(lbl) {
                        let origColor = lbl.style.borderColor;
                        lbl.innerText = "✅ تم استيراد الملف بنجاح"; lbl.style.borderColor = "#2ed573"; lbl.style.color = "#2ed573";
                        setTimeout(() => { lbl.innerText = "📂 استيراد ملف M3U"; lbl.style.borderColor = origColor; lbl.style.color = origColor; }, 2000);
                    }
                    e.target.value = '';
                };
                reader.onerror = function() { alert("حدث خطأ في قراءة الملف"); };
                reader.readAsText(file);
            }
        };

        window.handleFolderFileInput = function(e) {
            if(e.target.files.length > 0) {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function(event) {
                    let content = event.target.result;
                    let targetFolderId = window.folderState.currentFolderId;
                    let pos = prompt("أين تريد إضافة قنوات الملف؟\n1- في البداية\n2- في النهاية", "1");
                    
                    let lines = content.split('\n');
                    let currentName = "قناة بدون اسم";
                    let newChannels = [];
                    
                    for(let i = 0; i < lines.length; i++) {
                        let line = lines[i].trim();
                        if(line === "") continue;
                        if(line.startsWith("#EXTINF")) {
                            let commaIndex = line.lastIndexOf(',');
                            if(commaIndex !== -1) currentName = line.substring(commaIndex + 1).trim();
                            else currentName = "قناة " + (i+1);
                        } else if (!line.startsWith("#")) {
                            newChannels.push({ type: "channel", name: currentName, link: line });
                            currentName = "قناة بدون اسم"; 
                        }
                    }

                    if(!window.folderState.folders[targetFolderId]) window.folderState.folders[targetFolderId] = [];
                    let arr = window.folderState.folders[targetFolderId];
                    if(pos === "2") { arr.push(...newChannels); } 
                    else {
                        let firstFolderIdx = arr.findIndex(x => x.type === 'folder');
                        if(firstFolderIdx === -1) arr.unshift(...newChannels);
                        else arr.splice(firstFolderIdx, 0, ...newChannels);
                    }

                    window.renderCurrentFolder();
                    window.autoSave();
                    alert("تم استيراد قنوات الملف داخل المجلد بنجاح!");
                    e.target.value = '';
                };
                reader.onerror = function() { alert("حدث خطأ في قراءة الملف"); };
                reader.readAsText(file);
            }
        };

        window.processM3UContent = function(content) {
            let lines = content.split('\n');
            let currentName = "قناة بدون اسم";
            let currentGroup = "";
            let addedCount = 0;
            
            for(let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if(line === "") continue;
                
                if(line.startsWith("#EXTINF")) {
                    let commaIndex = line.lastIndexOf(',');
                    if(commaIndex !== -1) currentName = line.substring(commaIndex + 1).trim();
                    else currentName = "قناة " + (i+1);
                    
                    let groupMatch = line.match(/group-title="([^"]+)"/i) || line.match(/group-title=([^,]+)/i);
                    if(groupMatch) currentGroup = groupMatch[1].trim();
                    else currentGroup = ""; 
                } else if (line.startsWith("#EXTGRP:")) {
                    currentGroup = line.substring(8).trim();
                } else if (!line.startsWith("#")) {
                    let targetFolderId = window.folderState.currentFolderId;
                    
                    if(currentGroup && currentGroup !== "") {
                        if(!window.folderState.folders[targetFolderId]) window.folderState.folders[targetFolderId] = [];
                        let existingFolder = window.folderState.folders[targetFolderId].find(f => f.type === 'folder' && f.name === currentGroup);
                        if(existingFolder) { targetFolderId = existingFolder.id; } 
                        else {
                            let newFolderId = "folder_" + Date.now() + Math.random().toString(36).substr(2, 5);
                            window.folderState.folders[newFolderId] = [];
                            window.folderState.folders[targetFolderId].push({ type: "folder", id: newFolderId, name: currentGroup });
                            targetFolderId = newFolderId;
                        }
                        if(!window.folderState.folders[targetFolderId]) window.folderState.folders[targetFolderId] = [];
                        window.folderState.folders[targetFolderId].push({ type: "channel", name: currentName, link: line });
                        addedCount++;
                    } else {
                        if(!window.folderState.folders[targetFolderId]) window.folderState.folders[targetFolderId] = [];
                        let arr = window.folderState.folders[targetFolderId];
                        let firstFolderIdx = arr.findIndex(x => x.type === 'folder');
                        if (firstFolderIdx === -1) { arr.push({ type: "channel", name: currentName, link: line }); } 
                        else { arr.splice(firstFolderIdx, 0, { type: "channel", name: currentName, link: line }); }
                        addedCount++;
                    }
                    currentName = "قناة بدون اسم"; currentGroup = ""; 
                }
            }
            window.renderCurrentFolder();
            window.autoSave();
            alert("تم استيراد " + addedCount + " قناة بنجاح!");
        };

        window.getChannelsInCurrentFolder = function() {
            return (window.folderState.folders[window.folderState.currentFolderId] || []).filter(x => x.type === 'channel');
        };

        window.playChannelByIndex = function(index) {
            let channels = window.getChannelsInCurrentFolder();
            if(channels.length === 0) { alert("لا توجد قنوات في هذا المجلد للتشغيل!"); return; }
            if(index >= channels.length) index = 0; 
            if(index < 0) index = channels.length - 1;
            window.currentChannelIndex = index;
            let ch = channels[index];
            window.generateIframe(ch.link);
            let statusBadge = document.getElementById("stream-status");
            if(statusBadge) statusBadge.innerText = "🟢 يعمل الآن: " + ch.name;

            // تحديث التمييز مع الـ Auto-scroll
            document.querySelectorAll('.aplr-link').forEach(el => el.classList.remove('playing-item'));
            let activeBtn = document.querySelector(`.aplr-link[data-channel-idx="${index}"]`);
            if (activeBtn) {
                activeBtn.classList.add('playing-item');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        };

        window.prevChannel = function() { window.playChannelByIndex(window.currentChannelIndex - 1); };
        window.nextChannel = function() { window.playChannelByIndex(window.currentChannelIndex + 1); };

        window.toggleAutoSwitch = function() {
            let btn = document.getElementById('btn-auto-switch');
            let sec = parseInt(document.getElementById('auto-switch-sec').value) || 10;

            if (isActive) {
                btn.innerText = "متوقف"; btn.style.borderColor = "#f39c12"; btn.style.color = "#f39c12";
                clearInterval(window.autoSwitchTimer);
            } else {
                btn.innerText = "مفعل"; btn.style.borderColor = "#2ed573"; btn.style.color = "#2ed573";

        window.openXtreamModal = async function() { 
            let host = prompt("رابط الهوست (مثال: http://host.com:8080):"); if(!host) return;
            let user = prompt("اليوزر (Username):"); let pass = prompt("الباسورد (Password):");
            if(user && pass) {
                try {
                    let res = await fetch(`${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=m3u8`);
                    window.processM3UContent(await res.text());
                    if(window.triggerActionSuccess) window.triggerActionSuccess('btn-xtream', '📡 حساب اكستريم', 'rgb(39, 174, 96)');

            if(mac) {

        window.downloadAsHTML = function() { 
            let htmlContent = document.documentElement.outerHTML;

            let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "my_player.html";
            a.click(); URL.revokeObjectURL(a.href);
            if(window.triggerActionSuccess) window.triggerActionSuccess('btn-download-html', '⬇️ تحميل كـ HTML', '#0abde3');

        window.applySettingsToUI = function() {
            let s = window.playerSettings; if(!s) return;
            if(s.engine) document.getElementById("player-engine-selector").value = s.engine;
            if(s.directLink) document.getElementById("direct-link-input").value = s.directLink;
            if(s.autoSwitchSec) document.getElementById("auto-switch-sec").value = s.autoSwitchSec;
            if(s.theme) { document.getElementById("theme-selector").value = s.theme; window.applyTheme(s.theme); }
            if(s.zoom) { window.currentZoom = s.zoom; document.getElementById("player-area").style.transform = "scale(" + window.currentZoom + ")"; }

            let setToggle = (id, isActive, tT, tF, cT, cF) => {
                let btn = document.getElementById(id); if(!btn) return;
                btn.innerText = isActive ? tT : tF; btn.style.borderColor = isActive ? cT : cF; btn.style.color = isActive ? cT : cF;
            };

            setToggle('btn-auto-switch', s.autoSwitchState, "مفعل", "متوقف", "#2ed573", "#f39c12");
            if(s.autoSwitchState && !window.autoSwitchTimer) window.autoSwitchTimer = setInterval(window.nextChannel, (s.autoSwitchSec||10)*1000);
            
            window.isEditMode = s.editModeState || false;
            let btn1 = document.getElementById('btn-modal-edit-mode');
            if(window.isEditMode) {
                if(btn1) { btn1.innerText = "✏️ تعطيل التعديل"; btn1.style.borderColor = "#2ed573"; btn1.style.color = "#fff"; btn1.style.background = "#2ed573"; }
            } else {
                if(btn1) { btn1.innerText = "✏️ تفعيل التعديل والنقل"; btn1.style.borderColor = "#f1c40f"; btn1.style.color = "#f1c40f"; btn1.style.background = "#111"; }
            }

            window.prot.strict = s.strictProtectState !== undefined ? s.strictProtectState : true;
            setToggle('btn-strict-protect', window.prot.strict, "🛡️ حماية قصوى (مفعلة)", "🛡️ حماية قصوى (معطلة)", "#2ed573", "#e74c3c");

            window.prot.overlay = s.overlayState || false;
            setToggle('btn-overlay', window.prot.overlay, "👻 الطبقة الشفافة (مفعل)", "👻 الطبقة الشفافة", "#2ed573", "#dcdde1");

            window.prot.sandbox = s.sandboxState !== undefined ? s.sandboxState : true;
            setToggle('btn-sandbox', window.prot.sandbox, "🔒 قيود التشغيل (مفعلة)", "🔒 قيود التشغيل (معطلة)", "#2ed573", "#e74c3c");

            window.prot.popups = s.popupsState || false;
            setToggle('btn-popups', window.prot.popups, "✅ النوافذ المنبثقة (مسموحة)", "🚫 النوافذ المنبثقة (ممنوعة)", "#2ed573", "#e74c3c");

            window.prot.inspect = s.inspectState || false;
            setToggle('btn-inspect', window.prot.inspect, "🕵️ منع الفحص (مفعل)", "🕵️ منع الفحص", "#2ed573", "#2f3640");
            
            window.superBlockerEnabled = s.superBlockerState !== undefined ? s.superBlockerState : false;
            let btnSuper = document.getElementById("btn-super-blocker");
            if(btnSuper) {
                if(window.superBlockerEnabled) {
                    btnSuper.innerText = "🛡️ الحماية القصوى (مفعل)"; btnSuper.style.background = "#27ae60";
                } else {
                    btnSuper.innerText = "⚠️ الحماية القصوى (معطل)"; btnSuper.style.background = "#c0392b";
                }
            }
            if(window.currentPlayingUrl) window.generateIframe(window.currentPlayingUrl);
        };

        };
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // تسجيل الدخول التلقائي لو دخل الباسورد قبل كده في نفس الجلسة
            if (sessionStorage.getItem("adminAuth") === "true") {
                window.isAdmin = true;
                let loginBtn = document.getElementById('login-btn');
                if(loginBtn) loginBtn.style.display = 'none';
                let adminElems = document.querySelectorAll('.admin-only');
                adminElems.forEach(el => el.classList.remove('admin-only'));
            }

            window.renderScreens(); 
            window.renderCurrentFolder(); 

            window.isDataFetched = false;
            let fetchRetries = 0;
            let autoFetchLoop = setInterval(function() {
                if (typeof window.doLoadFromFirebase === 'function') {
                    if (!window.isDataFetched) {
                        window.doLoadFromFirebase();
                        if (typeof window.setupPresence === 'function') window.setupPresence(); 
                        if (typeof window.setupInspectObserver === 'function') window.setupInspectObserver(); 
                    } else {
                        clearInterval(autoFetchLoop); 
                    }
                }
                fetchRetries++;
                if(fetchRetries > 30) clearInterval(autoFetchLoop);
            }, 1000); 

            if(window.doLoadFromFirebase) window.doLoadFromFirebase();
            if(window.setupPresence) window.setupPresence();
            if(window.setupInspectObserver) window.setupInspectObserver();
        });
    </script>
